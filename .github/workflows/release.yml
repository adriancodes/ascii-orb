name: Release

# Publishes via npm Trusted Publishing (OIDC) — no npm token anywhere.
# Dispatch-only until the first (manual) publish of 0.1.0 exists and the
# trusted publisher is configured on npmjs.com; then restore:
#   push:
#     branches: [main]
on:
  workflow_dispatch:

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "Release ascii-orb"
          commit: "release: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
